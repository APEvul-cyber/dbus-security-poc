<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!--
    PoC 5: com.example.PowerManager1 信号监听服务的 D-Bus 策略
    允许服务注册和接收信号
  -->

  <policy user="root">
    <allow own="com.example.PowerManager1"/>
    <allow send_destination="com.example.PowerManager1"/>
  </policy>

  <policy context="default">
    <!-- 允许所有用户向该服务发送消息 -->
    <allow send_destination="com.example.PowerManager1"/>

    <!-- 
      关键: 允许所有用户发送广播信号（无 destination）
      这是很多系统的默认配置，也是 PoC 5 的前提条件
    -->
  </policy>
</busconfig>
