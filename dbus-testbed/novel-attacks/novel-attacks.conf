<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="org.example.ConfigManager1"/>
    <allow own="com.example.SessionManager1"/>
    <allow own="com.example.NMFirewallHelper"/>
    <allow own="com.example.PrivilegedConfig1"/>
    <allow send_destination="org.example.ConfigManager1"/>
    <allow send_destination="com.example.SessionManager1"/>
    <allow send_destination="com.example.NMFirewallHelper"/>
    <allow send_destination="com.example.PrivilegedConfig1"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.example.ConfigManager1"/>
    <allow send_destination="com.example.SessionManager1"/>
    <allow send_destination="com.example.NMFirewallHelper"/>
    <allow send_destination="com.example.PrivilegedConfig1"/>
    <allow receive_sender="org.example.ConfigManager1"/>
    <allow receive_sender="com.example.SessionManager1"/>
    <allow receive_sender="com.example.NMFirewallHelper"/>
    <allow receive_sender="com.example.PrivilegedConfig1"/>
  </policy>
</busconfig>
