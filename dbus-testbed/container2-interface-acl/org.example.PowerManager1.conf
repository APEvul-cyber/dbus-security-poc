<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!--
    PoC 3 测试策略: 故意使用有缺陷的 send_interface ACL
    
    漏洞点: 策略仅通过 send_interface 限制对 PowerOff 方法的访问，
    但没有处理 INTERFACE header 被省略的情况。
    
    根据 CVE-2008-0595 和 D-Bus 规范:
    如果 METHOD_CALL 不携带 INTERFACE header，send_interface 规则不会匹配，
    导致 deny 规则被绕过。
  -->

  <!-- 允许 root 拥有该服务名 -->
  <policy user="root">
    <allow own="org.example.PowerManager1"/>
    <allow send_destination="org.example.PowerManager1"/>
  </policy>

  <!-- 默认策略: 允许所有人连接和基本操作 -->
  <policy context="default">
    <!-- 允许所有人向该服务发送消息（基础连接） -->
    <allow send_destination="org.example.PowerManager1"/>

    <!-- 
      关键 ACL: 禁止非 root 用户调用 PowerOff 方法
      注意: 这里使用 send_interface 做限制，这是有缺陷的！
      如果攻击者省略 INTERFACE header，此 deny 规则不会匹配
    -->
    <deny send_destination="org.example.PowerManager1"
          send_interface="org.example.PowerManager1.Manager"
          send_member="PowerOff"/>

    <!-- 允许 Introspect（方便调试） -->
    <allow send_destination="org.example.PowerManager1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.example.PowerManager1"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>
